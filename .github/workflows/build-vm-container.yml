name: build-vm-container

on:
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer identifier (e.g., 2026.04.22-1)"
        required: true
        type: string
      base_image_sha256:
        description: "Override pinned Debian sha256 (debugging only)"
        required: false
        type: string
      publish:
        description: "Upload to R2 and update latest.json"
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - "packages/browseros-agent/packages/vm-container/**"
      - ".github/workflows/build-vm-container.yml"
  schedule:
    - cron: "0 6 * * 1"

env:
  BUN_VERSION: "1.3.6"
  PKG_DIR: packages/browseros-agent/packages/vm-container
  ARTIFACT_RETENTION_DAYS: 7

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm64
          - arch: x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install libguestfs + qemu-utils + zstd
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils zstd
          echo "LIBGUESTFS_BACKEND=direct" >> "$GITHUB_ENV"
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run --filter @browseros/vm-container typecheck
      - name: Unit tests
        run: bun run --filter @browseros/vm-container test
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y.%m.%d)-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        working-directory: ${{ env.PKG_DIR }}
        run: |
          bun run build -- \
            --version "${{ steps.version.outputs.value }}" \
            --arch "${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/dist/vm/${{ matrix.arch }}" \
            ${{ inputs.base_image_sha256 && format('--base-image-sha256 {0}', inputs.base_image_sha256) || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-disk-${{ matrix.arch }}
          path: dist/vm/${{ matrix.arch }}/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  smoke:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: vm-disk-x64
          path: dist/vm/x64/
      - name: Install qemu + zstd + Lima
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils zstd curl
          LIMA_VERSION=$(cat "${PKG_DIR}/recipe/LIMA_VERSION.pin")
          curl -L -o /tmp/lima.tar.gz \
            "https://github.com/lima-vm/lima/releases/download/${LIMA_VERSION}/lima-${LIMA_VERSION#v}-Linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf /tmp/lima.tar.gz
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Smoke test
        working-directory: ${{ env.PKG_DIR }}
        run: |
          QCOW=$(ls "$GITHUB_WORKSPACE/dist/vm/x64/"browseros-vm-*-x64.qcow2.zst | head -n1)
          bun run smoke -- --qcow "$QCOW" --limactl /usr/local/bin/limactl

  publish:
    needs: [build, smoke]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          pattern: vm-disk-*
          path: dist/vm/
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Upload to R2
        working-directory: ${{ env.PKG_DIR }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          bun run upload -- \
            --version "${{ inputs.version }}" \
            --artifact-dir "$GITHUB_WORKSPACE/dist/vm"
